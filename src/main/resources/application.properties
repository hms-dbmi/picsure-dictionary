spring.application.name=dictionary
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}?currentSchema=dict
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

server.port=80

dashboard.columns={abbreviation:'Abbreviation',name:'Name',clinvars:'Clinical Variables'}
dashboard.column-order=abbreviation,name,clinvars
dashboard.nonmeta-columns=abbreviation,name
dashboard.enable.extra_details=true
dashboard.enable.bdc_hack=false
dashboard.layout.type=default

filtering.unfilterable_concepts=stigmatized

concept.tree.max_depth=100

cache.duration-minutes=60
cache.maximum-size=5000

# Search backend: "postgres" (default) or "meilisearch"
search.backend=postgres

# Meilisearch configuration
meilisearch.url=${MEILISEARCH_URL:http://localhost:7700}
meilisearch.api-key=${MEILISEARCH_API_KEY:}
meilisearch.index-name=concepts
meilisearch.dataset-index-name=datasets
meilisearch.indexing.debug-file=debug.json
